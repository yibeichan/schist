name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  cli:
    name: CLI (Python)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: cli/pyproject.toml

      - name: Install CLI + pytest
        run: pip install -e ./cli pytest

      - name: Configure git identity for subprocess tests
        run: |
          git config --global user.email "ci@schist.test"
          git config --global user.name "schist-ci"
          git config --global init.defaultBranch main

      - name: Run pytest
        run: python -m pytest cli/tests -v

  mcp-server:
    name: MCP server (TypeScript)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: mcp-server
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: mcp-server/package-lock.json

      - name: Install deps
        run: npm ci

      - name: Type-check (tsc build)
        run: npm run build

      - name: Run jest
        run: npm test
