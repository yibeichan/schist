name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  cli:
    name: CLI (Python)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: cli/pyproject.toml

      - name: Install CLI + pytest
        run: pip install -e ./cli pytest

      - name: Configure git identity for subprocess tests
        run: |
          git config --global user.email "ci@schist.test"
          git config --global user.name "schist-ci"
          git config --global init.defaultBranch main

      - name: Run pytest (cli + viewer)
        run: python -m pytest cli/tests viewer/tests -v

  mcp-server:
    name: MCP server (TypeScript)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: mcp-server
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: mcp-server/package-lock.json

      - name: Install deps
        run: npm ci

      - name: Type-check (tsc build)
        run: npm run build

      - name: Run jest
        run: npm test
