name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize, ready_for_review, reopened]
    # Optional: Only run on specific file changes
    # paths:
    #   - "src/**/*.ts"
    #   - "src/**/*.tsx"
    #   - "src/**/*.js"
    #   - "src/**/*.jsx"

jobs:
  claude-review:
    # Skip Dependabot PRs: their runs execute with a restricted token and have
    # no access to repo secrets, so CLAUDE_CODE_OAUTH_TOKEN is empty and the
    # action fails on the installation-token exchange. Dependency bumps are
    # handled by the dependabot-auto-merge workflow instead.
    if: github.actor != 'dependabot[bot]'

    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
      issues: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 1

      - name: Detect review workflow self-change
        id: workflow-diff
        env:
          BASE_REF: ${{ github.event.pull_request.base.ref }}
        run: |
          set -euo pipefail

          git fetch --no-tags --depth=1 origin "${BASE_REF}"
          if git diff --name-only "origin/${BASE_REF}" HEAD \
            | grep -Fxq ".github/workflows/claude-code-review.yml"; then
            echo "self_changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "self_changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Run Claude Code Review
        id: claude-review
        if: steps.workflow-diff.outputs.self_changed != 'true'
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          plugin_marketplaces: 'https://github.com/anthropics/claude-code.git'
          plugins: 'code-review@claude-code-plugins'
          prompt: '/code-review:code-review ${{ github.repository }}/pull/${{ github.event.pull_request.number }}'
          # See https://github.com/anthropics/claude-code-action/blob/main/docs/usage.md
          # or https://code.claude.com/docs/en/cli-reference for available options

      - name: Confirm Claude review completed
        if: success() && steps.workflow-diff.outputs.self_changed != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPOSITORY: ${{ github.repository }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          set -euo pipefail

          marker="<!-- schist-claude-review-confirmation -->"
          body_file="$(mktemp)"
          cat > "$body_file" <<EOF
          ${marker}
          Claude Code review completed successfully.

          If there are no inline Claude comments on this PR, Claude did not publish any actionable findings for this run.

          Workflow run: ${RUN_URL}
          EOF

          comment_id="$(
            gh api "repos/${REPOSITORY}/issues/${PR_NUMBER}/comments" --paginate \
              --jq ".[] | select(.body | contains(\"${marker}\")) | .id" \
              | head -n 1
          )" || {
            echo "GitHub token could not read existing PR comments; recording confirmation in the job summary." >> "$GITHUB_STEP_SUMMARY"
            cat "$body_file" >> "$GITHUB_STEP_SUMMARY"
            exit 0
          }

          body="$(cat "$body_file")"
          if [ -n "$comment_id" ]; then
            if ! gh api \
              --method PATCH \
              "repos/${REPOSITORY}/issues/comments/${comment_id}" \
              --field body="$body" >/dev/null; then
              echo "GitHub token could not update the Claude confirmation PR comment; recording confirmation in the job summary." >> "$GITHUB_STEP_SUMMARY"
              cat "$body_file" >> "$GITHUB_STEP_SUMMARY"
            fi
          else
            if ! gh api \
              --method POST \
              "repos/${REPOSITORY}/issues/${PR_NUMBER}/comments" \
              --field body="$body" >/dev/null; then
              echo "GitHub token could not create the Claude confirmation PR comment; recording confirmation in the job summary." >> "$GITHUB_STEP_SUMMARY"
              cat "$body_file" >> "$GITHUB_STEP_SUMMARY"
            fi
          fi

      - name: Record Claude review skipped for workflow self-change
        if: success() && steps.workflow-diff.outputs.self_changed == 'true'
        env:
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          set -euo pipefail

          cat >> "$GITHUB_STEP_SUMMARY" <<EOF
          ## Claude Code Review

          Claude Code review was skipped because this PR changes the Claude review workflow itself.

          The Claude Code Action requires the workflow file to match the default branch before it will exchange its OIDC token. After this workflow change is merged, future PRs will receive normal Claude review completion comments.

          Workflow run: ${RUN_URL}
          EOF
